name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TEST_DATABASE_URL: postgres://handsel:handsel@127.0.0.1:5432/handsel_test
      ALLOW_DESTRUCTIVE_INTEGRATION: "true"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_TEST_PUBLISHABLE_KEY }}

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: handsel
          POSTGRES_PASSWORD: handsel
          POSTGRES_DB: handsel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U handsel -d handsel_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run test:integration
      - run: npm run build
      - run: npm run test:e2e
